name: Release CTL

run-name: "Release CTL: ${{ github.ref_name }}"

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Checksum
        id: checksum
        run: |
          checksum=$(
            {
              sha256sum go.mod go.sum

              # Exclude _test files; they are not needed to build the code and
              # they change more often than the actual build inputs.
              find . -type f -name "*.go" ! -name "*_test.go" -print0 | \
                sort -z | xargs -0 sha256sum
            } | sha256sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: release-ctl-go-mod-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: release-ctl-go-build-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.checksum.outputs.checksum }}
          restore-keys: |
            release-ctl-go-build-${{ matrix.goos }}-${{ matrix.goarch }}-

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CTL_BIN_NAME=locksmithctl-${{ matrix.goos }}-${{ matrix.goarch }}
          [[ "${{ matrix.goos }}" == "windows" ]] && CTL_BIN_NAME="${CTL_BIN_NAME}.exe"
          CTL_BIN_NAME=${CTL_BIN_NAME} make ctl/build/release


      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN=locksmithctl-${{ matrix.goos }}-${{ matrix.goarch }}
          [[ "${{ matrix.goos }}" == "windows" ]] && BIN="${BIN}.exe"
          gh release upload ${{ github.ref_name }} "build/${BIN}"
