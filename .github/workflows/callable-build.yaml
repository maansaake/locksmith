name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang ${{ matrix.go-version-alias }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Checksum
        id: checksum
        run: |
          checksum=$(
            {
              sha256sum go.mod go.sum

              # Exclude _test files; they are not needed to build the code and
              # they change more often than the actual build inputs.
              find . -type f -name "*.go" ! -name "*_test.go" -print0 | \
                sort -z | xargs -0 sha256sum
            } | sha256sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Restore Go module cache
        id: go-mod-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('go.sum') }}

      - name: Restore Go build cache
        id: go-build-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/go-build
          key: build-${{ steps.checksum.outputs.checksum }}
          restore-keys: |
            build-

      - name: Build server binary
        run: make build

      - name: Build CLI binary
        run: make buildctl

      - name: Save Go module cache
        if: steps.go-mod-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('go.sum') }}

      - name: Save Go build cache
        if: steps.go-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/go-build
          key: build-${{ steps.checksum.outputs.checksum }}
