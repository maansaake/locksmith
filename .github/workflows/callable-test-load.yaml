name: Load test

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Version to test."
        required: false
        default: "unstable"

permissions:
  contents: read

jobs:
  load-test:
    env:
      VERSION: ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Checksum
        id: checksum
        run: |
          checksum=$(
            {
              sha256sum go.mod go.sum
              find . -type f -name "*.go" -print0 | sort -z | xargs -0 sha256sum
            } | sha256sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: load-test-go-mod-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: load-test-go-build-${{ steps.checksum.outputs.checksum }}
          restore-keys: |
            load-test-go-build-

      - name: Run test environment
        run: make compose

      - name: Run load test
        run: make load-test

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p build/load-test
          make compose-logs > build/load-test/compose.log

      - name: Upload load test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: load-test-artifacts
          path: build/load-test
          if-no-files-found: ignore

      - name: Teardown test environment
        if: always()
        run: make compose-down
