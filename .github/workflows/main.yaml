name: Main branch protection

run-name: "Main branch protection: ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/callable-build.yaml

  unit-test:
    uses: ./.github/workflows/callable-test-unit.yaml

  image:
    name: Image
    uses: ./.github/workflows/image.yaml
    with:
      push: true

  integration-test:
    needs: image
    uses: ./.github/workflows/callable-test-integration.yaml
    secrets: inherit
