name: Main branch protection

run-name: "Main branch protection: ${{ github.run_number }}"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/callable-build.yaml
    secrets: inherit

  unit-test:
    uses: ./.github/workflows/callable-test-unit.yaml
    secrets: inherit

  image:
    uses: ./.github/workflows/callable-image.yaml
    secrets: inherit
    with:
      push: true

  integration-test:
    needs: image
    uses: ./.github/workflows/callable-test-integration.yaml
    secrets: inherit
