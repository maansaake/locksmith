name: Unit test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Checksum
        id: checksum
        run: |
          checksum=$(
            {
              sha256sum go.mod go.sum
              find . -type f -name "*.go" -print0 | sort -z | xargs -0 sha256sum
            } | sha256sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: unit-test-go-mod-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build
          key: unit-test-go-build-${{ steps.checksum.outputs.checksum }}
          restore-keys: |
            unit-test-go-build-

      - name: Run tests
        run: |
          make test/unit/cover

      - name: Generate coverage report
        run: go tool cover -html=build/coverage.out -o build/coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report
          path: build/coverage.html
