version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      minor:
        update-types:
          - minor
      patches:
        update-types:
          - patch

  - package-ecosystem: gomod
    directory: /tools
    schedule:
      interval: weekly
    groups:
      minor:
        update-types:
          - minor
      patches:
        update-types:
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      minor:
        update-types:
          - minor
      patches:
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      minor:
        update-types:
          - minor
      patches:
        update-types:
          - patch
